{% extends "dashboard/base.html" %}
{% block content %}

<h2>
    {% if view.object %}
        Edit Coupon
    {% else %}
        Create Coupon
    {% endif %}
</h2>

<hr>

<form method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label>Code</label>
        {{ form.code }}
    </div>

    <div class="form-group">
        <label>Discount Type</label>
        {{ form.discount_type }}
    </div>

    <div class="form-group">
        <label>Discount Value</label>
        {{ form.discount_value }}
    </div>

    <div class="form-group">
        <label>Expiry Date</label>
        {{ form.expiry_date }}
    </div>

    <div class="form-group">
        <label>Per User Usage Limit</label>
        {{ form.per_user_limit }}
    </div>

    <div class="checkbox">
        <label>
            {{ form.is_active }} Active
        </label>
    </div>

    <button type="submit" class="btn btn-success">
        Save Coupon
    </button>

    <a href="{% url 'dashboard:coupons' %}" class="btn btn-default">
        Cancel
    </a>

</form>

{% endblock %}
