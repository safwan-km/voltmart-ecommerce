{% extends "dashboard/base.html" %}
{% block content %}

<h3>Are you sure you want to delete "{{ object.name }}"?</h3>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirm Delete</button>
    <a href="{% url 'dashboard:products' %}" class="btn btn-default">Cancel</a>
</form>

{% endblock %}
