{% extends "dashboard/base.html" %}
{% block content %}

<h2>
    {% if view.object %}
        Edit Product
    {% else %}
        Create Product
    {% endif %}
</h2>

<hr>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="row">
        <div class="col-md-6">
            <div class="form-group">
                <label>Category</label>
                {{ form.category }}
            </div>
        </div>

        <div class="col-md-6">
            <div class="form-group">
                <label>Name</label>
                {{ form.name }}
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>Description</label>
        {{ form.description }}
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="form-group">
                <label>Price</label>
                {{ form.price }}
            </div>
        </div>

        <div class="col-md-4">
            <div class="form-group">
                <label>Stock</label>
                {{ form.stock }}
            </div>
        </div>

        <div class="col-md-4">
            <div class="form-group">
                <label>Image</label>
                {{ form.image }}
            </div>
        </div>
    </div>

    <div class="checkbox">
        <label>
            {{ form.is_active }} Active Product
        </label>
    </div>

    <hr>

    <button type="submit" class="btn btn-success">
        Save Product
    </button>

    <a href="{% url 'dashboard:products' %}" class="btn btn-default">
        Cancel
    </a>

</form>

{% endblock %}
