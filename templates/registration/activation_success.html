{% extends "base.html" %}

{% block title %}Account Activated — VoltMart{% endblock %}

{% block content %}
<div style="background:#f5f5f5; padding:80px 0; min-height:60vh;">
  <div class="container">
    <div style="max-width:520px; margin:0 auto; background:#fff; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,0.09); padding:50px 40px; text-align:center;">

      <div style="width:72px; height:72px; background:#e6f9f0; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px;">
        <i class="fa fa-check" style="font-size:32px; color:#27ae60;"></i>
      </div>

      <h2 style="color:#2B2D42; font-weight:700; margin-bottom:12px;">Email Verified!</h2>
      <p style="color:#555; font-size:15px; margin-bottom:8px;">
        Your account has been successfully activated.
      </p>
      <p style="color:#8D99AE; font-size:13px; margin-bottom:32px;">
        You can now log in and start shopping at VoltMart.
      </p>

      <a href="{% url 'login' %}"
         style="display:inline-block; padding:13px 36px; background:#D10024; color:#fff; border-radius:4px;
                text-decoration:none; font-weight:700; font-size:15px; letter-spacing:0.3px;">
        Log In to Your Account
      </a>

    </div>
  </div>
</div>
{% endblock %}
