{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 400px;">
  <h3 class="text-center mb-4">Login</h3>

  <form method="post">
    {% csrf_token %}

    {% if form.errors %}
      <div class="alert alert-danger">
        Invalid username or password
      </div>
    {% endif %}

    <div class="form-group">
      <label>Username</label>
      <input
        type="text"
        name="username"
        class="form-control"
        required
      >
    </div>

    <div class="form-group mt-3">
      <label>Password</label>
      <input
        type="password"
        name="password"
        class="form-control"
        required
      >
    </div>

    <button type="submit" class="primary-btn mt-4" style="width:100%;">
      Login
    </button>
  </form>
</div>
{% endblock %}
