{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div style="background:#f5f5f5; padding:60px 0;">
  <div class="container">
    <div class="auth-card" style="text-align:center;">

      <div style="width:80px; height:80px; background:#E8F5E9; border-radius:50%; margin:0 auto 25px; display:flex; align-items:center; justify-content:center;">
        <i class="fa fa-check-circle" style="font-size:40px; color:#4CAF50;"></i>
      </div>

      <h3 style="margin-bottom:15px;">Password Reset Successful</h3>
      <p style="color:#666; margin-bottom:25px;">Your password has been reset successfully. You can now login with your new password.</p>

      <a href="{% url 'login' %}" class="primary-btn">Login Now</a>

    </div>
  </div>
</div>
{% endblock %}
