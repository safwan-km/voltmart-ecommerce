{% extends 'base.html' %}

{% block title %}Email Sent{% endblock %}

{% block content %}
<div style="background:#f5f5f5; padding:60px 0;">
  <div class="container">
    <div class="auth-card" style="text-align:center;">

      <div style="width:80px; height:80px; background:#E3F2FD; border-radius:50%; margin:0 auto 25px; display:flex; align-items:center; justify-content:center;">
        <i class="fa fa-envelope" style="font-size:40px; color:#2196F3;"></i>
      </div>

      <h3 style="margin-bottom:15px;">Email Sent Successfully</h3>
      <p style="color:#666; margin-bottom:25px;">Check your email for the password reset link. If you don't see it, check your spam folder.</p>

      <a href="{% url 'login' %}" class="primary-btn">Back to Login</a>

    </div>
  </div>
</div>
{% endblock %}
